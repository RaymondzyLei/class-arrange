<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/icons.svg" />
    <title>选课助手</title>
    <script>
      // 在 React 挂载前预置深色主题，避免加载页 fallback 出现 light->dark 闪现。
      (function () {
        try {
          if (localStorage.getItem('class-arrange:v1:theme') === 'dark') {
            document.documentElement.dataset.theme = 'dark';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
